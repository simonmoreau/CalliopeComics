services:
  webapp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5678:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=CalliopeComics;Username=postgres;Password=postgres"
      ConnectionStrings__LogDatabase: "Host=db;Port=5432;Database=CalliopeComics_log;Username=postgres;Password=postgres"
      ApplicationSettings__StoragePath: "/data/CalliopeComics"
    volumes:
      - /mnt/c/Users/smoreau/Downloads/TestStorage/:/data/CalliopeComics
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "CalliopeComics"
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  CalliopeComics-data:
  postgres-data:
